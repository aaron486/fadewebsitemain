<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — The Chip</title>
<meta name="description" content="FADE — a tribute to the chip-in at the 16th, Augusta 2005." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: radial-gradient(120% 100% at 50% 0%, #2f7d3a 0%, #1d5226 55%, #0c2914 100%);
  overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace; }
.stage { position: fixed; inset: 0; overflow: hidden; }
.year { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 48vh; color: rgba(255,255,255,0.05); letter-spacing: -0.05em; }
/* the hole + flag */
.hole { position: absolute; left: 50%; top: 58%; width: 40px; height: 16px; transform: translate(-50%,-50%);
  background: #07140a; border-radius: 50%; box-shadow: inset 0 3px 6px rgba(0,0,0,0.8); }
.flag { position: absolute; left: calc(50% + 2px); top: 30%; width: 3px; height: 28%;
  background: rgba(255,255,255,0.7); }
.flag::after { content: ""; position: absolute; left: 3px; top: 0; width: 34px; height: 20px;
  background: #d22; clip-path: polygon(0 0, 100% 50%, 0 100%); }
/* the ball: rolls in, hangs on the lip, then drops */
.ball { position: absolute; top: calc(58% - 11px); left: 14%; width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff, #dcdcdc); box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  animation: roll 4.2s cubic-bezier(.5,0,.5,1) infinite; }
@keyframes roll {
  0%   { left: 14%;  top: calc(58% - 11px); opacity: 1; }
  46%  { left: calc(50% - 22px); top: calc(58% - 11px); }
  64%  { left: calc(50% - 13px); top: calc(58% - 13px); }   /* hang on the lip */
  70%  { left: calc(50% - 11px); top: calc(58% - 11px); }
  78%  { left: calc(50% - 9px);  top: calc(58% - 6px); opacity: 1; } /* drop */
  84%  { left: calc(50% - 9px);  top: calc(58% + 2px); opacity: 0.2; }
  86%, 100% { left: 14%; top: calc(58% - 11px); opacity: 0; }
}
.logo { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
  color: #fff; pointer-events: none; }
.logo svg { width: clamp(170px, 40vw, 470px); height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.5)); }
.cap { position: fixed; left: 0; right: 0; bottom: 1.4rem; text-align: center; z-index: 11;
  color: rgba(255,255,255,0.78); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
.cap b { color: #fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="year">16</div>
  <div class="flag"></div>
  <div class="hole"></div>
  <div class="ball"></div>
</div>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<div class="cap">The Chip on Sixteen &middot; <b>Augusta &middot; 2005</b></div>
</body>
</html>
