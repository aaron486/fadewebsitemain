<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — Progress Tracker</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #050507; color: rgba(255,255,255,0.75); line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; }
a { color: #3b82f6; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Gate */
.gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: #050507; z-index: 10; }
.gate::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 620px; height: 420px; background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 62%); filter: blur(80px); pointer-events: none; }
.gate-card { position: relative; width: 100%; max-width: 380px; text-align: center; }
.gate-brand { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-bottom: 2rem; }
.gate-brand svg { display: block; }
.gate-brand .tagline { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(59,130,246,0.85); }
.gate-lock { width: 52px; height: 52px; border-radius: 14px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25); display: flex; align-items: center; justify-content: center; font-size: 1.35rem; margin: 0 auto 1.5rem; }
.gate-card h1 { font-size: 1.6rem; font-weight: 800; color: white; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
.gate-card p { font-size: 0.9375rem; color: rgba(255,255,255,0.5); margin-bottom: 1.75rem; }
.gate-card input { width: 100%; padding: 0.9rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: white; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
.gate-card input:focus { border-color: #3b82f6; }
.gate-card button { width: 100%; margin-top: 0.75rem; padding: 0.9rem; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s, transform 0.15s; }
.gate-card button:hover { background: #2f6fe0; transform: translateY(-1px); }
.gate-card button:disabled { opacity: 0.6; cursor: wait; transform: none; }
.gate-err { min-height: 1.2rem; margin-top: 0.9rem; font-size: 0.85rem; color: #f87171; font-family: 'JetBrains Mono', monospace; }

/* Layout */
.docwrap { max-width: 780px; margin: 0 auto; padding: 3.5rem 1.5rem 5rem; }
.tracker { position: relative; min-width: 0; }

/* Tracker */
.t-brand { margin-bottom: 1.75rem; }
.t-brand svg { display: block; }
.t-head { margin-bottom: 2rem; }
.t-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(248,113,113,0.85); display: inline-block; margin-bottom: 0.75rem; padding: 0.3rem 0.7rem; border: 1px solid rgba(248,113,113,0.25); border-radius: 999px; }
.t-head h1 { font-size: clamp(1.8rem, 4.5vw, 2.5rem); font-weight: 900; color: white; letter-spacing: -0.03em; line-height: 1.1; }
.t-sub { font-size: 1rem; color: rgba(255,255,255,0.5); margin-top: 0.6rem; }
.t-day { display: flex; align-items: center; gap: 1.6rem; margin-top: 1.5rem; padding: 1.7rem 2rem; background: linear-gradient(135deg, rgba(59,130,246,0.16), rgba(59,130,246,0.03)); border: 1px solid rgba(59,130,246,0.22); border-radius: 18px; }
.t-day-num { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: clamp(3.4rem, 13vw, 5.2rem); line-height: 0.82; color: #60a5fa; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.t-day-meta { display: flex; flex-direction: column; gap: 0.4rem; }
.t-day-word { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.3rem; color: #fff; }
.t-day-lbl { font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); }
@media (max-width: 600px) { .t-day { gap: 1rem; padding: 1.3rem 1.4rem; } }

/* This week */
.tw { margin-top: 1.5rem; padding: 1.5rem 1.7rem; background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(96,165,250,0.02)); border: 1px solid rgba(96,165,250,0.22); border-radius: 18px; }
.tw-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(96,165,250,0.9); margin-bottom: 1rem; }
.tw-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
.tw-list li { position: relative; padding-left: 1.5rem; font-size: 0.98rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
.tw-list li::before { content: ''; position: absolute; left: 0; top: 0.55em; width: 7px; height: 7px; border-radius: 50%; background: #60a5fa; box-shadow: 0 0 8px rgba(96,165,250,0.7); }
.tw-list li strong { color: #fff; font-weight: 700; }

/* Countdown */
@font-face { font-family: 'DSEG7'; src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
.cd { display: flex; flex-direction: column; gap: 1.1rem; margin-top: 1.75rem; padding: 1.6rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; }
.cd-head { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
.cd-title { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
.cd-edit { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); background: none; border: 1px solid rgba(255,255,255,0.12); padding: 0.3rem 0.7rem; border-radius: 999px; cursor: pointer; flex-shrink: 0; }
.cd-edit:hover { color: #60a5fa; border-color: rgba(59,130,246,0.4); }
.cd-editor { display: flex; flex-direction: column; gap: 0.7rem; padding: 1rem; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
.cd-field { display: flex; flex-direction: column; gap: 0.3rem; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); flex: 1; }
.cd-field input { font-family: 'Inter', sans-serif; font-size: 0.9rem; text-transform: none; letter-spacing: normal; color: white; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; padding: 0.5rem 0.6rem; outline: none; }
.cd-field input:focus { border-color: #3b82f6; }
.cd-field input[type=date] { color-scheme: dark; }
.cd-field-row { display: flex; gap: 0.7rem; }
.cd-editor-actions { display: flex; gap: 0.5rem; justify-content: flex-end; align-items: center; }
.cd-editor-actions button { font-family: inherit; font-size: 0.78rem; font-weight: 600; padding: 0.42rem 0.9rem; border-radius: 7px; cursor: pointer; border: 1px solid transparent; }
.cd-save { background: #3b82f6; color: white; }
.cd-save:hover { background: #2f6fe0; }
.cd-cancel { background: transparent; color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.15); }
.cd-cancel:hover { color: white; }
.cd-reset { background: transparent; color: rgba(248,113,113,0.8); border-color: rgba(248,113,113,0.25); margin-right: auto; }
.cd-reset:hover { color: #f87171; }
.cd-dials { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.cd-unit { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; }
.cd-dial { position: relative; width: 116px; height: 116px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(59,130,246,0.05), transparent 70%); --p: 0%; }
.cd-dial::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: repeating-conic-gradient(rgba(255,255,255,0.16) 0deg 1.3deg, transparent 1.3deg 6deg); -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 11px)); mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 11px)); }
.cd-dial::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(#3b82f6 var(--p), rgba(255,255,255,0.07) var(--p)); -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px)); mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px)); filter: drop-shadow(0 0 4px rgba(59,130,246,0.6)); transition: background 0.5s linear; }
.cd-num { position: relative; z-index: 1; font-family: 'DSEG7', 'JetBrains Mono', monospace; font-weight: 700; font-size: 2rem; color: #5eb0ff; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; text-shadow: 0 0 12px rgba(59,130,246,0.55); }
.cd-label { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(94,176,255,0.7); }
.cd-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; margin-top: 0.3rem; }
.cd-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #3b82f6, #60a5fa); width: 0%; transition: width 0.6s ease; }
.cd-bar-meta { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; letter-spacing: 0.05em; color: rgba(255,255,255,0.4); }
.cd-bar-meta .cd-bar-pct { color: rgba(96,165,250,0.85); }
@media (max-width: 600px) { .cd-dial { width: 92px; height: 92px; } .cd-num { font-size: 1.6rem; } .cd-dials { gap: 0.75rem; justify-content: space-between; } }
.t-lock-out { float: right; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); cursor: pointer; background: none; border: 1px solid rgba(255,255,255,0.12); padding: 0.4rem 0.8rem; border-radius: 999px; }
.t-lock-out:hover { color: white; }

.t-summary { padding: 1.5rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; margin-bottom: 2.5rem; }
.t-summary-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.9rem; }
.t-summary-top .pct { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 800; color: #3b82f6; }
.t-summary-top .lbl { font-size: 0.8rem; color: rgba(255,255,255,0.45); }
.t-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
.t-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.t-summary-meta { display: flex; gap: 1.5rem; margin-top: 1rem; font-size: 0.8125rem; color: rgba(255,255,255,0.5); flex-wrap: wrap; }
.t-summary-meta strong { color: white; font-family: 'JetBrains Mono', monospace; }
.t-summary-meta .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.4rem; vertical-align: middle; }
.dot-done { background: #4ade80; } .dot-prog { background: #fbbf24; } .dot-soon { background: rgba(255,255,255,0.3); }

.t-group { margin-bottom: 2.25rem; }
.t-group h2 { font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(59,130,246,0.85); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.t-group h2 .t-when { color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: 0.04em; }
.t-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
.t-item { display: flex; gap: 1rem; align-items: flex-start; padding: 1.1rem 1.25rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; }
.t-status { flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.35rem 0.65rem; border-radius: 999px; margin-top: 0.1rem; min-width: 92px; text-align: center; }
.t-item.done .t-status { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
.t-item.prog .t-status { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
.t-item.soon .t-status { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.1); }
.t-item-body { display: flex; flex-direction: column; gap: 0.15rem; }
.t-item-body strong { color: white; font-weight: 600; font-size: 0.95rem; }
.t-item.done .t-item-body strong { color: rgba(255,255,255,0.6); text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.25); }
.t-item-body span { font-size: 0.85rem; color: rgba(255,255,255,0.45); line-height: 1.5; }

/* Phase 0 header + category sections */
.ph-head { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(59,130,246,0.85); margin-top: 2.75rem; }
.ph-overview { margin: 0.85rem 0 0.25rem; }
.ph-overview .cmt-body { font-size: 1.02rem; color: rgba(255,255,255,0.78); line-height: 1.7; }
.ph-overview .summary-edit { margin-top: 0.5rem; }
.ph-wins .cmt-body .note-ul li::before { content: '\2713'; color: #4ade80; font-weight: 700; }
.ph-wins .cmt-body .note-ul li { color: rgba(255,255,255,0.85); }

/* Founding-member survey baseline */
.svy-baseline { margin-bottom: 1.4rem; }
.svy-highlight { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin: 0.5rem 0 1rem; }
.svy-stat { padding: 1.3rem 0.8rem; background: rgba(59,130,246,0.05); border: 1px solid rgba(59,130,246,0.14); border-radius: 12px; text-align: center; }
.svy-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.7rem; font-weight: 800; color: #3b82f6; line-height: 1; }
.svy-stat-lbl { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 0.5rem; line-height: 1.35; }
.survey-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.svy-card { padding: 1.2rem 1.1rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
.svy-card h4 { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(59,130,246,0.85); margin-bottom: 1rem; }
.bar-row { margin-bottom: 0.8rem; }
.bar-row:last-child { margin-bottom: 0; }
.bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.35rem; gap: 0.75rem; }
.bar-label { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
.bar-val { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.bar-track { height: 7px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #60a5fa); border-radius: 999px; }
.bar-fill.up { background: linear-gradient(90deg, #16a34a, #4ade80); }
.bar-fill.down { background: linear-gradient(90deg, #dc2626, #f87171); }
.bar-fill.neutral { background: rgba(255,255,255,0.28); }
.svy-details { margin-top: 0.6rem; }
.svy-details > summary { list-style: none; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(96,165,250,0.85); display: flex; align-items: center; padding: 0.7rem 0; border-top: 1px solid rgba(255,255,255,0.08); }
.svy-details > summary:hover { color: #60a5fa; }
.svy-details > summary::-webkit-details-marker { display: none; }
.svy-details > summary::after { content: '+'; margin-left: auto; color: rgba(255,255,255,0.5); font-weight: 700; }
.svy-details[open] > summary::after { content: '\2013'; }
.svy-details[open] .survey-grid { margin-top: 0.9rem; }
.svy-details:not([open]) .survey-grid { display: none; }
@media (max-width: 600px) { .svy-highlight { grid-template-columns: 1fr 1fr; } .survey-grid { grid-template-columns: 1fr; } }
.cat { margin-top: 1.25rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; }
.cat-head { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1.25rem 1.5rem; background: none; border: none; cursor: pointer; text-align: left; }
.cat-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 0; }
.cat-head:hover .cat-title { color: #60a5fa; }
.cat-chev { color: rgba(255,255,255,0.4); font-size: 0.85rem; transition: transform 0.2s; }
.cat.collapsed .cat-chev { transform: rotate(-90deg); }
.cat-body { padding: 0 1.5rem 1.5rem; }
.cat.collapsed .cat-body { display: none; }
.cat-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin: 0.4rem 0 0.7rem; }
.media-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
.media-tab { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem 0.9rem; border-radius: 999px; cursor: pointer; transition: color 0.15s, background 0.15s, border-color 0.15s; }
.media-tab:hover { color: #fff; }
.media-tab.active { color: #fff; background: rgba(59,130,246,0.16); border-color: rgba(59,130,246,0.5); }
.media-panel { display: none; }
.media-panel.active { display: block; }
.media-panel .cat-summary { margin-bottom: 1.4rem; }
.cat-summary { margin-bottom: 1.4rem; }
.cat-summary .cmt-body { color: rgba(255,255,255,0.8); }
.cat-summary .summary-edit { margin-top: 0.5rem; }
.dlv-list { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.4rem; }
.dlv-item { display: flex; align-items: flex-start; gap: 0.65rem; }
.dlv-box { flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.25); background: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; line-height: 1; margin-top: 0.1rem; transition: all 0.15s; padding: 0; }
.dlv-box:hover { border-color: #3b82f6; }
.dlv-item.done .dlv-box { background: #3b82f6; border-color: #3b82f6; }
.dlv-label { font-size: 0.92rem; color: rgba(255,255,255,0.8); line-height: 1.45; flex: 1; }
.dlv-item.done .dlv-label { color: rgba(255,255,255,0.4); text-decoration: line-through; }
.dlv-rm { flex-shrink: 0; background: none; border: none; color: rgba(255,255,255,0.22); font-size: 1.05rem; cursor: pointer; padding: 0 0.15rem; line-height: 1; }
.dlv-rm:hover { color: #f87171; }
.dlv-add input { width: 100%; margin-top: 0.35rem; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.88rem; padding: 0.55rem 0.65rem; outline: none; }
.dlv-add input:focus { border-color: #3b82f6; border-style: solid; }
.dlv-done-group { margin-top: 1.1rem; padding-top: 0.95rem; border-top: 1px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 0.45rem; }
.dlv-done-head { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(74,222,128,0.7); margin-bottom: 0.2rem; }
.cat-thread { display: flex; flex-direction: column; gap: 0.7rem; }
.cat-empty { font-size: 0.85rem; color: rgba(255,255,255,0.3); font-style: italic; }
.cat-addwrap { margin-top: 0.2rem; }
.cat-add { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(96,165,250,0.85); background: none; border: 1px dashed rgba(59,130,246,0.3); padding: 0.5rem 0.8rem; border-radius: 8px; cursor: pointer; }
.cat-add:hover { color: #60a5fa; border-color: rgba(59,130,246,0.5); }

/* Comments / notes */
.cmt-msg { position: relative; padding: 0.75rem 0.9rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
.cmt-ctrl { display: flex; gap: 0.8rem; margin-top: 0.6rem; opacity: 0; transition: opacity 0.15s; }
.cmt-msg:hover .cmt-ctrl { opacity: 1; }
.cmt-edit-btn, .cmt-del-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: none; cursor: pointer; padding: 0; }
.cmt-edit-btn { color: rgba(96,165,250,0.8); }
.cmt-edit-btn:hover { color: #60a5fa; }
.cmt-del-btn { color: rgba(255,255,255,0.3); }
.cmt-del-btn:hover { color: #f87171; }
.cmt-edit-ta { width: 100%; min-height: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.9rem; line-height: 1.5; padding: 0.6rem; outline: none; resize: vertical; margin-top: 0.4rem; }
.cmt-edit-ta:focus { border-color: #3b82f6; }
.cmt-meta { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-bottom: 0.25rem; }
.cmt-meta strong { color: rgba(255,255,255,0.82); font-weight: 600; }
.cmt-body { font-size: 0.9rem; color: rgba(255,255,255,0.75); line-height: 1.55; word-wrap: break-word; overflow-wrap: anywhere; }
.cmt-body a { color: #60a5fa; }
.ig-embeds { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-top: 0.7rem; }

.cmt-body .note-h1 { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(96,165,250,0.9); margin: 1.1rem 0 0.5rem; }
.cmt-body .note-h1:first-child { margin-top: 0; }

.cmt-body .note-ul li::before { content: '•'; position: absolute; left: 0.1rem; color: rgba(59,130,246,0.75); }
.cmt-body .note-hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1.1rem 0; }
.cmt-form { margin-top: 0.65rem; }
.cmt-form input.cmt-name { width: 100%; margin-bottom: 0.4rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: white; font-family: inherit; font-size: 0.8rem; padding: 0.45rem 0.55rem; outline: none; }
.cmt-form textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: white; font-family: inherit; font-size: 0.85rem; padding: 0.5rem 0.55rem; resize: vertical; min-height: 56px; outline: none; line-height: 1.45; }
.cmt-form input.cmt-name:focus, .cmt-form textarea:focus { border-color: #3b82f6; }
.cmt-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; justify-content: flex-end; }
.cmt-actions button { font-family: inherit; font-size: 0.78rem; font-weight: 600; padding: 0.42rem 0.85rem; border-radius: 7px; cursor: pointer; border: 1px solid transparent; }
.cmt-post { background: #3b82f6; color: white; }
.cmt-post:hover { background: #2f6fe0; }
.cmt-post:disabled { opacity: 0.5; cursor: default; }
.cmt-cancel { background: transparent; color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.15); }
.cmt-cancel:hover { color: white; }
.cmt-err { color: #f87171; font-size: 0.72rem; margin-top: 0.4rem; }
.cmt-drop { margin-top: 0.6rem; border: 1px dashed rgba(255,255,255,0.18); border-radius: 8px; padding: 0.7rem; text-align: center; font-size: 0.74rem; color: rgba(255,255,255,0.4); cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s; }

.cmt-prev { position: relative; }

.cmt-prev .rm { position: absolute; top: -7px; right: -7px; width: 19px; height: 19px; border-radius: 50%; background: #f87171; color: #1a0000; border: none; font-size: 0.8rem; line-height: 1; cursor: pointer; padding: 0; }
.cmt-imgs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.6rem; }
.cmt-imgs a { display: block; }

  function b64ToBytes(b64) {

  async function decrypt(password) {
    var enc = new TextEncoder();
    var km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: PAYLOAD.iter, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']

    var pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) }, key, b64ToBytes(PAYLOAD.ct));
    return new TextDecoder().decode(pt);
  }

  // ---------- Countdown (Days / Hours / Minutes — no seconds), editable ----------
  function initCountdown() {
    var root = document.querySelector('.cd');
    if (!root) return;
    var KEY = 'fade_tracker_countdown';
    var dEl = document.getElementById('cd-d'), hEl = document.getElementById('cd-h'), mEl = document.getElementById('cd-m');
    var dDial = document.getElementById('dial-d'), hDial = document.getElementById('dial-h'), mDial = document.getElementById('dial-m');
    var bar = document.getElementById('cd-bar-fill'), pct = document.getElementById('cd-bar-pct');
    var titleEl = document.getElementById('cd-title'), startLbl = document.getElementById('cd-start-lbl'), targetLbl = document.getElementById('cd-target-lbl');
    if (!dEl) return;

    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function parseDate(s) { if (!s) return null; var p = ('' + s).split('-'); if (p.length !== 3) return null; return new Date(+p[0], +p[1] - 1, +p[2]); }
    function fmt(d) { return d ? d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '—'; }
    function defaults() { return { label: root.getAttribute('data-label') || 'Countdown', start: root.getAttribute('data-start') || '', target: root.getAttribute('data-target') || '' }; }
    function config() { return defaults(); } // fixed countdown — no in-page editing

    var cfg, TARGET, START, spanDays;
    function apply() {
      cfg = config();
      TARGET = parseDate(cfg.target);
      START = parseDate(cfg.start) || parseDate(defaults().start);
      if (titleEl) titleEl.textContent = cfg.label || 'Countdown';
      if (startLbl) startLbl.textContent = 'Start · ' + fmt(START);
      if (targetLbl) targetLbl.textContent = 'Target · ' + fmt(TARGET);
      spanDays = (TARGET && START) ? Math.max(1, Math.round((TARGET - START) / 86400000)) : 1;
      render();
    }
    function render() {
      if (!TARGET) return;
      var now = Date.now();
      var diff = Math.max(0, TARGET.getTime() - now);
      var days = Math.floor(diff / 86400000);
      var hours = Math.floor((diff % 86400000) / 3600000);
      var mins = Math.floor((diff % 3600000) / 60000);
      var secs = Math.floor((diff % 60000) / 1000);
      dEl.textContent = pad(days); hEl.textContent = pad(hours); mEl.textContent = pad(mins);
      // Dials move every second so the timer reads as live (no seconds digit shown):
      // days = how far through the countdown; hours = hours+mins of the day; minutes = a per-second sweep.
      if (dDial) dDial.style.setProperty('--p', Math.max(0, Math.min(100, (spanDays - days) / spanDays * 100)) + '%');
      if (hDial) hDial.style.setProperty('--p', ((hours + mins / 60) / 24 * 100) + '%');
      if (mDial) mDial.style.setProperty('--p', ((59 - secs) / 60 * 100) + '%');
      if (START) {
        var span = TARGET.getTime() - START.getTime();
        var elapsed = span > 0 ? Math.min(1, Math.max(0, (now - START.getTime()) / span)) : 1;
        if (bar) bar.style.width = (elapsed * 100).toFixed(1) + '%';
        if (pct) pct.textContent = Math.round(elapsed * 100) + '% elapsed';
      }
    }

    // Editor wiring
    var editBtn = document.getElementById('cd-edit'), editor = document.getElementById('cd-editor');
    var inLabel = document.getElementById('cd-in-label'), inStart = document.getElementById('cd-in-start'), inTarget = document.getElementById('cd-in-target');
    var saveBtn = document.getElementById('cd-save'), cancelBtn = document.getElementById('cd-cancel'), resetBtn = document.getElementById('cd-reset');
    if (editBtn) {
      editBtn.addEventListener('click', function () {
        inLabel.value = cfg.label || ''; inStart.value = cfg.start || ''; inTarget.value = cfg.target || '';
        editor.hidden = !editor.hidden;
      });
      cancelBtn.addEventListener('click', function () { editor.hidden = true; });
      saveBtn.addEventListener('click', function () {
        if (!inTarget.value) { inTarget.focus(); return; }
        localStorage.setItem(KEY, JSON.stringify({ label: inLabel.value.trim() || defaults().label, start: inStart.value || defaults().start, target: inTarget.value }));
        editor.hidden = true; apply();
      });
      resetBtn.addEventListener('click', function () { localStorage.removeItem(KEY); editor.hidden = true; apply(); });
    }

    apply();
    setInterval(render, 1000);
  }

  // ---------- Collapse / expand sections (state saved per browser) ----------
  function initCollapse() {
    var KEY = 'fade_tracker_collapsed';
    var state = {}; try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) {}
    Array.prototype.slice.call(content.querySelectorAll('.cat')).forEach(function (cat) {
      var sec = cat.getAttribute('data-section');
      var head = cat.querySelector('.cat-head');
      if (state[sec]) cat.classList.add('collapsed');
      if (head) {
        head.setAttribute('aria-expanded', String(!cat.classList.contains('collapsed')));
        head.addEventListener('click', function () {
          cat.classList.toggle('collapsed');
          var c = cat.classList.contains('collapsed');
          head.setAttribute('aria-expanded', String(!c));
          state[sec] = c; try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
        });
      }
    });
  }

  // ---------- Comments ----------
  var store, comments = [];

  function relTime(iso) {
    var t = new Date(iso).getTime(); if (isNaN(t)) return '';
    var s = Math.floor((Date.now() - t) / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24); if (d < 7) return d + 'd ago';
    return new Date(iso).toLocaleDateString();
  }

  function makeStore() {
    var useBackend = SUPABASE_URL.indexOf('http') === 0 && SUPABASE_ANON_KEY.length > 10;
    if (useBackend) {
      var base = SUPABASE_URL.replace(/\/$/, '') + '/rest/v1/comments';
      var headers = { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
      return {
        backend: true,

          if (!r.ok) throw new Error('load');

        },
        add: async function (c) {

        a.push(item); localStorage.setItem(KEY, JSON.stringify(a)); return item;
      }

  // Compress an image client-side to a small JPEG blob.
  function compressToBlob(file) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      img.onload = function () {
        var max = 1600, w = img.naturalWidth, h = img.naturalHeight;
        if (w > max || h > max) { if (w >= h) { h = Math.round(h * max / w); w = max; } else { w = Math.round(w * max / h); h = max; } }
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(img.src);
        c.toBlob(function (blob) { blob ? resolve(blob) : reject(new Error('encode failed')); }, 'image/jpeg', 0.82);
      };
      img.onerror = function () { URL.revokeObjectURL(img.src); reject(new Error('image load failed')); };
      img.src = URL.createObjectURL(file);
    });
  }

  // Upload to Supabase Storage; returns the public URL.
  // Images are compressed to JPEG; videos upload as-is.
  async function uploadMedia(anchor, file) {
    var isVideo = file.type && file.type.indexOf('video/') === 0;
    var body, ext, ctype;
    if (isVideo) {
      body = file;
      ext = (file.name.match(/\.[a-z0-9]+$/i) || ['.mp4'])[0].toLowerCase();
      ctype = file.type || 'video/mp4';
    } else {
      body = await compressToBlob(file); ext = '.jpg'; ctype = 'image/jpeg';
    }
    var path = anchor + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + ext;
    var base = SUPABASE_URL.replace(/\/$/, '');
    var r = await fetch(base + '/storage/v1/object/screenshots/' + path, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': ctype },
      body: body
    });
    if (!r.ok) throw new Error('upload failed');
    return base + '/storage/v1/object/public/screenshots/' + path;
  }

  function isVideoUrl(u) { return /\.(mp4|webm|mov|m4v|ogg)$/i.test(u); }

  // Notes with images are stored as JSON in the body: {"t": text, "i": [dataURIs]}.
  // Plain-text bodies (and any future `images` column) still work.
  function decodeNote(c) {
    var text = c.body || '', images = (c.images && c.images.length) ? c.images.slice() : [];
    if (text && text.charAt(0) === '{') {
      try { var o = JSON.parse(text); if (o && typeof o.t === 'string' && Array.isArray(o.i)) { text = o.t; images = images.concat(o.i); } } catch (e) {}
    }
    return { text: text, images: images };
  }

  // Escape, then turn URLs into clickable links.
  function escLink(s) {
    return esc(s).replace(/(https?:\/\/[^\s<]+)/g, function (u) {
      return '<a href="' + u.replace(/&amp;/g, '&') + '" target="_blank" rel="noopener noreferrer">' + u + '</a>';
    });
  }

  // Collect Instagram post/reel/tv embed URLs from a note body.
  function igEmbedUrls(text) {
    var out = [], seen = {}, re = /https?:\/\/(?:www\.)?instagram\.com\/(p|reel|reels|tv)\/([A-Za-z0-9_\-]+)/g, m;
    while ((m = re.exec(text || ''))) {
      var type = m[1] === 'reels' ? 'reel' : m[1], key = type + '/' + m[2];
      if (seen[key]) continue; seen[key] = 1;
      out.push('https://www.instagram.com/' + type + '/' + m[2] + '/embed');
    }
    return out;
  }

  // Lightly format a note body into headers / sub-headers / bullets / dividers.
  function formatNoteBody(text) {
    var lines = ('' + text).split('\n');
    var html = '', inList = false;
    function closeList() { if (inList) { html += '</ul>'; inList = false; } }
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line === '') { closeList(); continue; }
      if (/^[—–\-\s]{3,}$/.test(line)) { closeList(); html += '<hr class="note-hr">'; continue; }
      if (/^[•\-–]\s+/.test(line)) {
        if (!inList) { html += '<ul class="note-ul">'; inList = true; }
        html += '<li>' + escLink(line.replace(/^[•\-–]\s+/, '')) + '</li>';
        continue;
      }
      closeList();
      var letters = line.replace(/[^A-Za-z]/g, '');
      if (letters.length >= 2 && letters === letters.toUpperCase()) { html += '<div class="note-h1">' + esc(line) + '</div>'; continue; }
      var nextBullet = false;
      for (var j = i + 1; j < lines.length; j++) { var nl = lines[j].trim(); if (nl === '') continue; nextBullet = /^[•\-–]\s+/.test(nl); break; }
      if (nextBullet && line.length <= 42 && !/[.:!?]$/.test(line)) { html += '<div class="note-h2">' + esc(line) + '</div>'; continue; }
      html += '<p class="note-p">' + escLink(line) + '</p>';
    }
    closeList();
    return html;
  }

  function commentsFor(id) { return comments.filter(function (c) { return c.anchor === id; }); }

  function renderThread(container) {

  function startEditComment(c, msg, container) {

  async function updateComment(c, body) {
    if (SUPABASE_URL.indexOf('http') !== 0 || String(c.id).indexOf('local-') === 0) { return true; }
    try {
      var r = await fetch(SUPABASE_URL.replace(/\/$/, '') + '/rest/v1/comments?id=eq.' + c.id, {
        method: 'PATCH',

        body: JSON.stringify({ body: body })
      });
      if (!r.ok) return false;
      return (await r.json()).length > 0; // 0 rows => RLS blocked (no update policy)
    } catch (e) { return false; }
  }

  async function deleteComment(c, container) {

    if (SUPABASE_URL.indexOf('http') === 0 && String(c.id).indexOf('local-') !== 0) {
      try { await fetch(SUPABASE_URL.replace(/\/$/, '') + '/rest/v1/comments?id=eq.' + c.id, { method: 'DELETE', headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY } }); } catch (e) {}
    }

  function buildComposer(anchor, onDone, onCancel) {
    var form = document.createElement('div'); form.className = 'cmt-form';
    var nameInput = null;
    if (!getAuthor()) {
      nameInput = document.createElement('input');
      nameInput.className = 'cmt-name'; nameInput.type = 'text'; nameInput.placeholder = 'Your name';
      form.appendChild(nameInput);
    }
    var ta = document.createElement('textarea'); ta.placeholder = 'Write a comment or feedback…'; form.appendChild(ta);
    var errEl = document.createElement('div'); errEl.className = 'cmt-err'; errEl.style.display = 'none';

    // ---- Image attachments (drop / paste / click) ----
    var pending = []; // { url, uploading }
    var previews = document.createElement('div'); previews.className = 'cmt-previews';
    var drop = document.createElement('div'); drop.className = 'cmt-drop'; drop.textContent = 'Drop screenshots or videos here, paste, or click to upload';
    var fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*,video/*'; fileInput.multiple = true; fileInput.style.display = 'none';
    form.appendChild(previews); form.appendChild(drop); form.appendChild(fileInput);

    function addFiles(files) {
      Array.prototype.forEach.call(files, function (file) {
        var isImg = file.type && file.type.indexOf('image/') === 0;
        var isVid = file.type && file.type.indexOf('video/') === 0;
        if (!isImg && !isVid) return;
        var item = { url: null, uploading: true };
        var prev = document.createElement('div'); prev.className = 'cmt-prev uploading';
        var media = document.createElement(isVid ? 'video' : 'img');
        if (isVid) { media.muted = true; media.playsInline = true; }
        media.src = URL.createObjectURL(file); prev.appendChild(media);
        var rm = document.createElement('button'); rm.className = 'rm'; rm.type = 'button'; rm.textContent = '×';
        rm.addEventListener('click', function () { var i = pending.indexOf(item); if (i >= 0) pending.splice(i, 1); prev.remove(); });
        prev.appendChild(rm); previews.appendChild(prev); pending.push(item);
        uploadMedia(anchor, file).then(function (url) {
          item.url = url; item.uploading = false; prev.classList.remove('uploading');
        }).catch(function () {
          var i = pending.indexOf(item); if (i >= 0) pending.splice(i, 1); prev.remove();
          errEl.textContent = 'Upload failed (large videos may exceed the storage limit).'; errEl.style.display = 'block';
        });
      });
    }
    drop.addEventListener('click', function () { fileInput.click(); });
    fileInput.addEventListener('change', function () { addFiles(fileInput.files); fileInput.value = ''; });
    drop.addEventListener('dragover', function (e) { e.preventDefault(); drop.classList.add('drag'); });
    drop.addEventListener('dragleave', function () { drop.classList.remove('drag'); });
    drop.addEventListener('drop', function (e) { e.preventDefault(); drop.classList.remove('drag'); if (e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files); });
    ta.addEventListener('paste', function (e) {
      var items = e.clipboardData && e.clipboardData.items; if (!items) return;
      var imgs = []; for (var i = 0; i < items.length; i++) { if (items[i].type && items[i].type.indexOf('image/') === 0) { var f = items[i].getAsFile(); if (f) imgs.push(f); } }
      if (imgs.length) addFiles(imgs);
    });

    form.appendChild(errEl);
    var actions = document.createElement('div'); actions.className = 'cmt-actions';
    var cancel = document.createElement('button'); cancel.className = 'cmt-cancel'; cancel.type = 'button'; cancel.textContent = 'Cancel';
    var post = document.createElement('button'); post.className = 'cmt-post'; post.type = 'button'; post.textContent = 'Post';
    actions.appendChild(cancel); actions.appendChild(post); form.appendChild(actions);

    cancel.addEventListener('click', function () { if (onCancel) onCancel(); });
    post.addEventListener('click', async function () {
      var body = ta.value.trim();
      var author = (nameInput ? nameInput.value.trim() : getAuthor()) || 'Anonymous';
      if (!body && !pending.length) { ta.focus(); return; }
      if (pending.some(function (p) { return p.uploading; })) { errEl.textContent = 'Hold on — images still uploading.'; errEl.style.display = 'block'; return; }
      post.disabled = true; post.textContent = 'Posting…'; errEl.style.display = 'none';
      var images = pending.map(function (p) { return p.url; }).filter(Boolean);
      var payload = { anchor: anchor, author: author, body: body };
      if (images.length) payload.images = images;
      try {
        var saved = await store.add(payload);
        if (nameInput && nameInput.value.trim()) setAuthor(nameInput.value.trim());
        comments.push(saved);
        if (onDone) onDone();
      } catch (e) {
        errEl.textContent = 'Could not save — check connection.'; errEl.style.display = 'block';
        post.disabled = false; post.textContent = 'Post';
      }
    });
    ta.addEventListener('keydown', function (e) { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') post.click(); });
    return form;
  }
})();
</script>
