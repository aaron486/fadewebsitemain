<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — Miracle on Ice</title>
<meta name="description" content="FADE — a tribute to the 1980 Miracle on Ice." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: linear-gradient(160deg, #0c2a52 0%, #071a33 55%, #04101f 100%);
  overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace; }
.stage { position: fixed; inset: 0; overflow: hidden; }
/* ice sheen */
.ice { position: absolute; inset: 0;
  background: radial-gradient(120% 60% at 50% 100%, rgba(255,255,255,0.12), transparent 60%); }
.year { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 44vh; color: rgba(255,255,255,0.05); letter-spacing: -0.03em; }
/* goal + net on the right */
.net { position: absolute; right: 7%; top: 50%; transform: translateY(-50%);
  width: 120px; height: 200px; border: 3px solid rgba(255,255,255,0.45); border-left: none;
  background-image: linear-gradient(rgba(255,255,255,0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px);
  background-size: 16px 16px; border-radius: 0 10px 10px 0; }
.lamp { position: absolute; right: 6%; top: 24%; width: 26px; height: 26px; border-radius: 50%;
  background: #ff2b2b; box-shadow: 0 0 0 4px rgba(255,255,255,0.15); opacity: 0.25;
  animation: lamp 2.8s ease-in-out infinite; }
@keyframes lamp { 0%,72% { opacity: 0.2; box-shadow: 0 0 0 4px rgba(255,255,255,0.15); }
  80% { opacity: 1; box-shadow: 0 0 50px 14px rgba(255,43,43,0.8); }
  100% { opacity: 0.2; } }
.puck { position: absolute; top: calc(50% - 7px); left: -8%; width: 34px; height: 14px;
  border-radius: 50%; background: #0a0a0a; box-shadow: 0 0 16px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.15);
  animation: slide 2.8s cubic-bezier(.25,.7,.35,1) infinite; }
.puck::after { content: ""; position: absolute; left: -60px; top: 5px; width: 60px; height: 4px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5)); border-radius: 2px; }
@keyframes slide { 0% { left: -8%; } 70%,100% { left: 80%; } }
.logo { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
  color: #fff; pointer-events: none; }
.logo svg { width: clamp(170px, 40vw, 470px); height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.6)); }
.cap { position: fixed; left: 0; right: 0; bottom: 1.4rem; text-align: center; z-index: 11;
  color: rgba(255,255,255,0.7); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
.cap b { color: #fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="ice"></div>
  <div class="year">1980</div>
  <div class="net"></div>
  <div class="lamp"></div>
  <div class="puck"></div>
</div>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<div class="cap">Do You Believe in Miracles? &middot; <b>Lake Placid &middot; 1980</b></div>
</body>
</html>
