<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade</title>
<meta name="description" content="The Fade logo over full-screen sports highlights." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: #000; overflow: hidden; }

/* one filter graded over everything inside — footage and logo alike */
.stage {
  position: fixed; inset: 0; overflow: hidden; background: #000;
  filter: grayscale(0.8) contrast(1.12) brightness(0.92) sepia(0.12);
}

/* full-screen video, cropped to fill */
.bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* the logo, centered on top — solid white, outside the grade */
.logo {
  position: fixed; inset: 0; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  color: #ffffff; pointer-events: none;
}
.logo svg { display: block; width: clamp(190px, 46vw, 560px); height: auto; }

/* tap-to-unmute hint (autoplay requires muted) */
.sound {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.66rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px; padding: 0.6rem 1.1rem; cursor: pointer; z-index: 5;
  transition: opacity 0.4s ease;
}
.sound:hover { color: #fff; border-color: rgba(255,255,255,0.45); }
.sound.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="stage">
  <video class="bg" id="bg" autoplay muted loop playsinline>
    <source src="assets/sports-history.mp4" type="video/mp4" />
  </video>
</div>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<button class="sound" id="sound" type="button">&#128266; Sound On</button>

<script>
(function () {
  var video = document.getElementById('bg');
  var sound = document.getElementById('sound');
  sound.addEventListener('click', function () {
    video.muted = !video.muted;
    if (!video.muted) { video.play(); sound.classList.add('hide'); }
  });
})();
</script>
</body>
</html>
