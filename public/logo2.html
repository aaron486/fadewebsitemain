<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade</title>
<meta name="description" content="The FADE logo filled with sports footage." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: #000; overflow: hidden; }

.stage { position: fixed; inset: 0; overflow: hidden; background: #000; }

/* shared full-screen, cropped-to-fill video sizing */
.layer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* 1) dimmed footage playing behind everything */
.back { filter: brightness(0.32) saturate(0.9); }

/* darken the background a touch more so the logo separates */
.scrim {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(120% 120% at 50% 50%, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.6) 100%);
  z-index: 1;
}

/* 2) the same footage, full brightness, clipped to the FADE letters */
.fill {
  z-index: 2;
  -webkit-mask: url(assets/fade-mask.svg) center / clamp(240px, 58vw, 720px) auto no-repeat;
          mask: url(assets/fade-mask.svg) center / clamp(240px, 58vw, 720px) auto no-repeat;
  filter: contrast(1.05) saturate(1.05)
          drop-shadow(0 6px 26px rgba(0,0,0,0.85));
}

/* sound toggle (autoplay requires muted) */
.sound {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.66rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px; padding: 0.6rem 1.1rem; cursor: pointer; z-index: 5;
  transition: opacity 0.4s ease;
}
.sound:hover { color: #fff; border-color: rgba(255,255,255,0.45); }
.sound.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="stage">
  <video class="layer back" id="back" autoplay muted loop playsinline>
    <source src="assets/sports-history.mp4" type="video/mp4" />
  </video>
  <div class="scrim"></div>
  <video class="layer fill" id="fill" autoplay muted loop playsinline>
    <source src="assets/sports-history.mp4" type="video/mp4" />
  </video>
</div>
<button class="sound" id="sound" type="button">&#128266; Sound On</button>

<script>
(function () {
  var back = document.getElementById('back');
  var fill = document.getElementById('fill');
  var sound = document.getElementById('sound');

  /* keep the two layers in sync so the letters match the background */
  function resync() {
    if (Math.abs(fill.currentTime - back.currentTime) > 0.12) {
      fill.currentTime = back.currentTime;
    }
  }
  back.addEventListener('timeupdate', resync);
  back.addEventListener('seeked', resync);
  back.addEventListener('play', function () { fill.play(); });

  /* sound rides on the background layer */
  sound.addEventListener('click', function () {
    back.muted = !back.muted;
    if (!back.muted) { back.play(); sound.classList.add('hide'); }
  });
})();
</script>
</body>
</html>
