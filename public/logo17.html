<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — Rumble in the Jungle</title>
<meta name="description" content="FADE — a tribute to the Rumble in the Jungle, 1974." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: radial-gradient(120% 120% at 50% 40%, #2a2207 0%, #16110a 55%, #070503 100%);
  overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace; }
.stage { position: fixed; inset: 0; overflow: hidden; }
/* ring ropes */
.ropes { position: absolute; left: 0; right: 0; bottom: 0; height: 30%; }
.ropes::before, .ropes::after { content: ""; position: absolute; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent); }
.ropes::before { top: 30%; } .ropes::after { top: 62%; }
.count { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 56vh; color: #d4af37; opacity: 0; letter-spacing: -0.04em;
  text-shadow: 0 0 60px rgba(212,175,55,0.5); }
.count.show { animation: punch 0.9s ease-out; }
@keyframes punch { 0% { opacity: 0; transform: scale(1.5); } 18% { opacity: 0.22; transform: scale(1); }
  82% { opacity: 0.22; } 100% { opacity: 0; } }
.flash { position: absolute; inset: 0; background: #d4af37; opacity: 0; pointer-events: none; }
.logo { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
  color: #fff; pointer-events: none; }
.logo svg { width: clamp(170px, 40vw, 470px); height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.6)); }
.cap { position: fixed; left: 0; right: 0; bottom: 1.4rem; text-align: center; z-index: 11;
  color: rgba(212,175,55,0.8); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
.cap b { color: #f4d678; }
</style>
</head>
<body>
<div class="stage">
  <div class="ropes"></div>
  <div class="count" id="count">8</div>
  <div class="flash" id="flash"></div>
</div>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<div class="cap">Rumble in the Jungle &middot; <b>Kinshasa &middot; 1974</b></div>
<script>
(function () {
  var count = document.getElementById('count'), n = 0;
  function tick() {
    n = n % 10 + 1;
    count.textContent = n;
    count.classList.remove('show'); void count.offsetWidth; count.classList.add('show');
    setTimeout(tick, 1000);
  }
  tick();
})();
</script>
</body>
</html>
