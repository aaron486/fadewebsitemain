<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — The Catch</title>
<meta name="description" content="FADE — a tribute to The Catch, 1982." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: linear-gradient(180deg, #3a1d4d 0%, #5a2a3a 50%, #7a3b2a 100%);
  overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace; }
.stage { position: fixed; inset: 0; overflow: hidden; }
.year { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 46vh; color: rgba(255,255,255,0.06); letter-spacing: -0.04em; }
/* end-zone line */
.line { position: absolute; right: 12%; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.35), transparent); }
.ballx { position: absolute; left: -8%; top: 64%; animation: bx 3.2s linear infinite; }
.bally { animation: by 1.6s cubic-bezier(.2,.55,.4,1) infinite alternate; }
.spin { animation: spin 0.5s linear infinite; }
.ball { width: 46px; height: 26px; border-radius: 50% / 50%; position: relative;
  background: radial-gradient(circle at 35% 30%, #9b5a2a, #6b3414);
  box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
.ball::before { content: ""; position: absolute; left: 50%; top: 20%; width: 2px; height: 60%;
  transform: translateX(-50%); background: rgba(255,255,255,0.9); }
.ball::after { content: ""; position: absolute; left: 38%; top: 50%; width: 24%; height: 2px;
  background: rgba(255,255,255,0.9); }
.trail { position: absolute; left: -50px; top: 12px; width: 50px; height: 4px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4)); border-radius: 2px; }
@keyframes bx { 0% { left: -8%; } 100% { left: 100%; } }
@keyframes by { 0% { transform: translateY(0); } 100% { transform: translateY(-40vh); } }
@keyframes spin { to { transform: rotate(360deg); } }
.logo { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
  color: #fff; pointer-events: none; }
.logo svg { width: clamp(170px, 40vw, 470px); height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.5)); }
.cap { position: fixed; left: 0; right: 0; bottom: 1.4rem; text-align: center; z-index: 11;
  color: rgba(255,255,255,0.72); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
.cap b { color: #fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="year">&rsquo;82</div>
  <div class="line"></div>
  <div class="ballx"><div class="bally"><div class="spin"><div class="ball"><div class="trail"></div></div></div></div></div>
</div>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<div class="cap">The Catch &middot; <b>Candlestick &middot; 1982</b></div>
</body>
</html>
