<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — Goal of the Century</title>
<meta name="description" content="FADE — a tribute to the Goal of the Century, 1986." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: linear-gradient(180deg, #5aa6d8 0%, #2f7cb3 45%, #1c4f78 100%);
  overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace; }
.stage { position: fixed; inset: 0; overflow: hidden; }
.year { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 46vh; color: rgba(255,255,255,0.1); letter-spacing: -0.04em; }
.grass { position: absolute; left: 0; right: 0; bottom: 0; height: 26%;
  background: repeating-linear-gradient(90deg, #2f7d3a 0 8%, #287034 8% 16%); }
/* net on the right */
.net { position: absolute; right: 8%; top: 50%; transform: translateY(-50%);
  width: 130px; height: 210px; border: 4px solid rgba(255,255,255,0.7); border-left: none;
  background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
  background-size: 15px 15px; border-radius: 0 8px 8px 0; }
.ballx { position: absolute; left: -8%; top: 58%; animation: bx 3.2s linear infinite; }
.bally { animation: by 3.2s cubic-bezier(.3,.1,.5,1) infinite; }
.ball { width: 30px; height: 30px; border-radius: 50%; position: relative; background: #fff;
  box-shadow: 0 6px 16px rgba(0,0,0,0.35); }
.ball::before { content: ""; position: absolute; left: 50%; top: 50%; width: 11px; height: 11px;
  transform: translate(-50%,-50%); background: #111;
  clip-path: polygon(50% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%); }
@keyframes bx { 0% { left: -8%; } 100% { left: 92%; } }
@keyframes by { 0% { transform: translateY(0); } 55% { transform: translateY(-22vh); } 100% { transform: translateY(6vh); } }
.logo { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
  color: #fff; pointer-events: none; }
.logo svg { width: clamp(170px, 40vw, 470px); height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.45)); }
.cap { position: fixed; left: 0; right: 0; bottom: 1.4rem; text-align: center; z-index: 11;
  color: rgba(255,255,255,0.85); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
.cap b { color: #fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="year">&rsquo;86</div>
  <div class="grass"></div>
  <div class="net"></div>
  <div class="ballx"><div class="bally"><div class="ball"></div></div></div>
</div>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<div class="cap">Goal of the Century &middot; <b>Mexico City &middot; 1986</b></div>
</body>
</html>
