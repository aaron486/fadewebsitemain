<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — Crayon</title>
<meta name="description" content="The Fade logo with the green crayon underline drawing on." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.stack { width: min(72vw, 900px); }
.mark { width: 100%; }
.mark svg { display: block; width: 100%; height: auto; }
.crayon { width: 86%; margin: 1.2vw auto 0; display: block; }
.crayon path {
  stroke-dasharray: 372;
  stroke-dashoffset: 372;
  animation: draw 4.6s cubic-bezier(0.6, 0, 0.3, 1) infinite;
  filter: drop-shadow(0 0 10px rgba(22,199,126,0.55));
}
@keyframes draw {
  0%       { stroke-dashoffset: 372; opacity: 1; }
  18%      { stroke-dashoffset: 0;   opacity: 1; }
  78%      { stroke-dashoffset: 0;   opacity: 1; }
  88%      { stroke-dashoffset: 0;   opacity: 0; }
  100%     { stroke-dashoffset: 372; opacity: 0; }
}
</style>
</head>
<body>
<div class="stack">
  <div class="mark">
    <svg viewBox="80 420 840 170" fill="#ffffff" aria-label="FADE">
      <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
      <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
      <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
      <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
    </svg>
  </div>
  <svg class="crayon" viewBox="0 0 360 14" preserveAspectRatio="none" aria-hidden="true">
    <path d="M4 9 C 70 4, 120 12, 190 7 S 300 10, 356 6" fill="none" stroke="#16c77e" stroke-width="5" stroke-linecap="round"/>
  </svg>
</div>
</body>
</html>
