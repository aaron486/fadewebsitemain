<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fade — The Perfect 10</title>
<meta name="description" content="FADE — a tribute to the first Perfect 10, Montreal 1976." />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: linear-gradient(180deg, #14233a 0%, #0c1626 100%);
  overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace; }
.stage { position: fixed; inset: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
/* retro scoreboard panel */
.board { margin-top: -6vh; padding: clamp(18px,3vw,40px) clamp(28px,5vw,70px);
  background: #0a0d07; border: 2px solid rgba(120,255,120,0.25); border-radius: 10px;
  box-shadow: 0 0 60px rgba(40,255,80,0.12), inset 0 0 30px rgba(0,0,0,0.6); }
.score { font-weight: 800; font-size: clamp(70px, 18vw, 220px); line-height: 1;
  color: #39ff66; letter-spacing: 0.04em; text-shadow: 0 0 24px rgba(57,255,102,0.7);
  font-variant-numeric: tabular-nums; }
.label { margin-top: 0.6rem; text-align: center; color: rgba(57,255,102,0.6);
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.3em; }
.logo { position: fixed; left: 0; right: 0; top: 12%; z-index: 10; display: flex; justify-content: center;
  color: #fff; pointer-events: none; }
.logo svg { width: clamp(150px, 32vw, 380px); height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.5)); }
.cap { position: fixed; left: 0; right: 0; bottom: 1.4rem; text-align: center; z-index: 11;
  color: rgba(255,255,255,0.72); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
.cap b { color: #fff; }
</style>
</head>
<body>
<div class="logo">
  <svg viewBox="80 420 840 170" fill="currentColor" aria-label="FADE">
    <polygon points="207,458.6 197.7,487.8 275.6,488.4 254.3,511 190.1,511 169.9,573.7 103.7,573.7 151.8,426.3 333.8,426.3 303.2,458.9"/>
    <polygon points="231.7,573.7 370,426.3 430.5,426.3 468.8,573.7 348.9,573.7 348.9,541.4 403.7,541.4 390,488.4 304,573.7"/>
    <path d="M684,426.3H517l-48.2,147.4H634l22.9-14.7l36.9-113.3L684,426.3z M596.5,541.8H547l26.9-82.6h49.5L596.5,541.8z"/>
    <polygon points="775.7,459.1 766.2,488.2 848.3,488.2 840.5,511.8 758.5,511.8 748.7,541.8 858.7,541.8 848.3,573.7 674.4,573.7 722.4,426.3 896.3,426.3 885.6,459.1"/>
  </svg>
</div>
<div class="stage">
  <div class="board">
    <div class="score" id="score">0.00</div>
    <div class="label">SCORE</div>
  </div>
</div>
<div class="cap">The Board Read 1.00 &mdash; It Meant a Perfect <b>10 &middot; Montr&eacute;al &middot; 1976</b></div>
<script>
(function () {
  var el = document.getElementById('score');
  /* the scoreboard famously couldn't display 10.00, so it flashed 1.00 */
  function cycle() {
    var start = performance.now(), DUR = 1400;
    function step(ts) {
      var p = Math.min(1, (ts - start) / DUR);
      el.textContent = (p * 1).toFixed(2);
      if (p < 1) requestAnimationFrame(step);
      else { el.textContent = '1.00'; setTimeout(cycle, 2200); }
    }
    requestAnimationFrame(step);
  }
  cycle();
})();
</script>
</body>
</html>
